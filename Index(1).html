<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8edf3;
    --text: #1a2332;
    --text2: #4a5568;
    --border: rgba(0,0,0,0.1);
    --glow: rgba(0,180,255,0.3);
    --accent: #0077cc;
    --panel-bg: #ffffff;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
    --grid-line: rgba(0,0,0,0.05);
  }
  .dark {
    --bg: #060d1a;
    --surface: #0d1b2e;
    --surface2: #112340;
    --text: #e8f4fd;
    --text2: #8bafc8;
    --border: rgba(0,180,255,0.15);
    --glow: rgba(0,180,255,0.45);
    --accent: #00b4ff;
    --panel-bg: #0d1b2e;
    --shadow: 0 8px 40px rgba(0,0,0,0.6);
    --grid-line: rgba(0,180,255,0.04);
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events:none;
    z-index:0;
    transition: all 0.4s;
  }

  /* ── TOPBAR ── */
  .topbar {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px;
    background: var(--surface);
    border-bottom:1px solid var(--border);
    box-shadow: var(--shadow);
    transition: background 0.4s, border-color 0.4s;
  }
  .topbar h1 {
    font-family:'Orbitron',monospace;
    font-weight:800; font-size:1.2rem;
    letter-spacing:0.12em;
    color: var(--accent);
    text-shadow: 0 0 18px var(--glow);
  }
  .topbar h1 span { color: var(--text); }

  #darkToggle {
    display:flex; align-items:center; gap:8px;
    background: var(--surface2);
    border:1px solid var(--border);
    border-radius:50px;
    padding:8px 16px;
    cursor:pointer;
    font-family:'Exo 2',sans-serif;
    font-size:0.8rem; font-weight:600;
    letter-spacing:0.06em;
    color: var(--text);
    transition: all 0.3s;
  }
  #darkToggle:hover {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--glow);
    color: var(--accent);
  }
  .ti { font-size:1rem; transition: transform 0.4s; }
  #darkToggle:hover .ti { transform: rotate(20deg) scale(1.2); }

  /* ── LEGEND ── */
  .legend {
    position:relative; z-index:5;
    display:flex; flex-wrap:wrap; gap:7px;
    padding:9px 24px;
    background: var(--surface);
    border-bottom:1px solid var(--border);
    transition: background 0.4s;
  }
  .li {
    display:flex; align-items:center; gap:5px;
    font-size:0.65rem; font-weight:600;
    letter-spacing:0.04em; color: var(--text2);
    text-transform:uppercase;
  }
  .ld { width:10px; height:10px; border-radius:3px; opacity:0.88; }

  /* ── MAIN LAYOUT ── */
  .main {
    position:relative; z-index:5;
    display:flex;
    justify-content: center;
    padding:16px 14px;
    gap:20px;
    min-height:calc(100vh - 108px);
  }

  /* ── TABLE WRAP (CENTER) ── */
  .table-wrap {
    flex:1; overflow-x:auto;
    display:flex; justify-content:center; align-items:flex-start;
    padding:0 8px;
  }
  .pgrid {
    display:grid;
    grid-template-columns: repeat(18, 50px);
    grid-template-rows: repeat(10, 50px);
    gap:3px;
    padding:8px;
  }

  /* ── ELEMENT CELL ── */
  .el {
    width:50px; height:50px;
    border-radius:7px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    cursor:pointer;
    border:1.5px solid rgba(255,255,255,0.18);
    position:relative; overflow:hidden;
    transition: transform .18s, box-shadow .18s, border-color .18s;
  }
  .el::after {
    content:''; position:absolute; inset:0;
    background:rgba(255,255,255,0);
    transition: background .2s; border-radius:inherit;
  }
  .el:hover { transform:scale(1.2) translateZ(0); z-index:20; }
  .el:hover::after { background:rgba(255,255,255,0.15); }
  .el:hover { box-shadow: 0 0 16px 3px var(--glow), 0 4px 18px rgba(0,0,0,0.3); }
  .el.sel {
    border-color: var(--accent) !important;
    box-shadow: 0 0 22px 5px var(--glow), 0 4px 22px rgba(0,0,0,0.4) !important;
    transform:scale(1.22) translateZ(0) !important;
    z-index:25 !important;
    animation: pls 2s infinite;
  }
  @keyframes pls {
    0%,100% { box-shadow:0 0 22px 5px var(--glow); }
    50% { box-shadow:0 0 32px 10px var(--glow); }
  }
  .el .en {
    font-family:'Share Tech Mono',monospace;
    font-size:0.52rem; color:rgba(255,255,255,0.72);
    line-height:1; align-self:flex-start;
    padding:3px 0 0 4px; width:100%;
  }
  .el .es {
    font-family:'Orbitron',monospace;
    font-size:1.05rem; font-weight:700;
    color:#fff; line-height:1;
    text-shadow:0 1px 5px rgba(0,0,0,0.4);
  }
  .el .enm {
    font-size:0.4rem; color:rgba(255,255,255,0.82);
    font-weight:600; letter-spacing:0.02em;
    text-align:center; width:100%;
    overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; padding:0 2px;
  }

  /* Category gradients */
  .ck-alkali          { background:linear-gradient(135deg,#ff6b6b,#c0392b); }
  .ck-alkaline        { background:linear-gradient(135deg,#ffa500,#d68910); }
  .ck-lanthanide      { background:linear-gradient(135deg,#da70d6,#8e44ad); }
  .ck-actinide        { background:linear-gradient(135deg,#9370db,#6c3483); }
  .ck-transition      { background:linear-gradient(135deg,#4fc3f7,#1565c0); }
  .ck-post-transition { background:linear-gradient(135deg,#81c784,#2e7d32); }
  .ck-metalloid       { background:linear-gradient(135deg,#ffd54f,#e65100); }
  .ck-nonmetal        { background:linear-gradient(135deg,#80cbc4,#00695c); }
  .ck-halogen         { background:linear-gradient(135deg,#f48fb1,#c2185b); }
  .ck-noble           { background:linear-gradient(135deg,#ce93d8,#6a1b9a); }
  .ck-unknown         { background:linear-gradient(135deg,#b0bec5,#455a64); }

  /* Placeholder dots for lanthanide/actinide */
  .placeholder-dot {
    width:50px; height:50px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Share Tech Mono',monospace;
    font-size:0.52rem;
    border:1.5px dashed;
  }
  .pd-la { background:rgba(218,112,214,0.1); border-color:rgba(218,112,214,0.5); color:#da70d6; }
  .pd-ac { background:rgba(147,112,219,0.1); border-color:rgba(147,112,219,0.5); color:#9370db; }

  /* ── INFO PANEL (RIGHT) ── */
  .info-panel {
    width:260px; min-width:260px;
    padding:16px 14px;
    position:sticky; top:20px;
    align-self:flex-start;
  }
  .info-card {
    background: var(--panel-bg);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    box-shadow: var(--shadow);
    transition: background 0.4s, border-color 0.4s;
    min-height:380px;
  }
  .info-hdr {
    font-family:'Orbitron',monospace;
    font-size:0.68rem; letter-spacing:0.15em;
    color: var(--accent); text-transform:uppercase;
    margin-bottom:14px; padding-bottom:9px;
    border-bottom:1px solid var(--border);
  }
  .ph {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:300px; gap:12px; opacity:0.4;
  }
  .ph-ico { font-size:2.8rem; animation: fl 3s ease-in-out infinite; }
  @keyframes fl {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .ph p { font-size:0.75rem; text-align:center; color: var(--text2); letter-spacing:0.04em; }
  .i-data { display:none; }
  .i-data.vis { display:block; }
  .i-name {
    font-family:'Orbitron',monospace;
    font-size:1.35rem; font-weight:800;
    color: var(--text); margin-bottom:4px;
    min-height:1.8rem;
  }
  .i-cat {
    font-size:0.68rem; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    padding:3px 10px; border-radius:20px;
    display:inline-block; color:#fff;
    margin-bottom:16px;
  }
  .i-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 0; border-bottom:1px solid var(--border);
    font-size:0.75rem;
  }
  .i-row .lbl { color: var(--text2); font-weight:600; letter-spacing:0.03em; }
  .i-row .val {
    font-family:'Share Tech Mono',monospace;
    font-size:0.78rem; color: var(--text); font-weight:600;
  }
  .i-desc {
    margin-top:14px; font-size:0.74rem;
    line-height:1.65; color: var(--text2); font-style:italic;
  }

  /* Word animation */
  .wanim .w {
    display:inline;
    opacity:0; transform:translateY(5px);
    animation: wr 0.22s forwards;
  }
  @keyframes wr { to { opacity:1; transform:translateY(0); } }

  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  @media (max-width:1200px) {
    .info-panel { width:210px; min-width:210px; }
    .pgrid { grid-template-columns:repeat(18,43px); grid-template-rows:repeat(10,43px); gap:2px; }
    .el { width:43px; height:43px; }
    .el .es { font-size:0.9rem; }
    .placeholder-dot { width:43px; height:43px; }
  }
</style>
</head>

<div class="topbar">
  <h1>⚛ PERIODIC <span>TABLE</span></h1>
  <button id="darkToggle">

<div class="main">
  <div class="table-wrap">
    <div class="pgrid" id="pg"></div>
  </div>

  <div class="info-panel">

      <div class="info-hdr">⬡ Element Data</div>

      <div class="i-data" id="id">

        <div class="i-cat" id="ic"></div>
        <div id="ir"></div>
        <div class="i-desc wanim" id="idesc"></div>
      </div>
    </div>
  </div>
</div>

const CAT_COLORS = {
  alkali:'#c0392b', alkaline:'#d68910', transition:'#1a6ea8',
  'post-transition':'#1e8449', metalloid:'#b7950b', nonmetal:'#0e8073',
  halogen:'#ad1457', noble:'#7b1fa2', lanthanide:'#7d3c98', actinide:'#5b2c6f', unknown:'#455a64'
};
const CAT_NAMES = {
  alkali:'Alkali Metal', alkaline:'Alkaline Earth Metal', transition:'Transition Metal',
  'post-transition':'Post-Transition Metal', metalloid:'Metalloid', nonmetal:'Nonmetal',
  halogen:'Halogen', noble:'Noble Gas', lanthanide:'Lanthanide', actinide:'Actinide', unknown:'Unknown'
};

const pg = document.getElementById('pg');
const cells = {};

EL.forEach(([num,sym,name,mass,cat]) => {
  if (!POS[num]) return;
  const [r,c] = POS[num];
  const div = document.createElement('div');
  div.className = `el ck-${cat}`;
  div.style.gridColumn = c;
  div.style.gridRow = r;
  div.innerHTML = `<div class="en">${num}</div><div class="es">${sym}</div><div class="enm">${name}</div>`;
  div.addEventListener('click', () => pick(num));
  pg.appendChild(div);
  cells[num] = div;
});

const lp = document.createElement('div');
lp.className = 'placeholder-dot pd-la';
lp.style.gridColumn = 3; lp.style.gridRow = 6;
lp.textContent = '57–71'; pg.appendChild(lp);

const ap = document.createElement('div');
ap.className = 'placeholder-dot pd-ac';
ap.style.gridColumn = 3; ap.style.gridRow = 7;
ap.textContent = '89–103'; pg.appendChild(ap);

let cur = null;

function pick(num) {
  const e = EL.find(x => x[0] === num);
  if (!e) return;
  const [n,sym,name,mass,cat,cfg,state,disc,desc] = e;

  if (cur && cells[cur]) cells[cur].classList.remove('sel');
  cur = num;
  if (cells[num]) cells[num].classList.add('sel');

  const color = CAT_COLORS[cat] || '#546e7a';

  document.getElementById('ph').style.display = 'none';
  const idata = document.getElementById('id');
  idata.style.display = 'block'; idata.classList.add('vis');

  wAnim('in', name, 0);

  const ic = document.getElementById('ic');
  ic.textContent = CAT_NAMES[cat] || cat;
  ic.style.background = color;
  ic.style.opacity = '0';
  setTimeout(() => { ic.style.transition='opacity .4s'; ic.style.opacity='1'; }, 100);

  const rows = [
    ['Symbol', sym], ['Atomic No.', n], ['Atomic Mass', mass+' u'],
    ['State', state], ['Config', cfg], ['Discovered', disc]
  ];
  const ir = document.getElementById('ir');
  ir.innerHTML = '';
  rows.forEach(([l,v], i) => {
    const d = document.createElement('div');
    d.className = 'i-row';
    d.style.cssText = `opacity:0;transform:translateX(18px);transition:opacity .3s ${i*55+120}ms,transform .3s ${i*55+120}ms`;
    d.innerHTML = `<span class="lbl">${l}</span><span class="val">${v}</span>`;
    ir.appendChild(d);
    requestAnimationFrame(() => requestAnimationFrame(() => { d.style.opacity='1'; d.style.transform='translateX(0)'; }));
  });

  setTimeout(() => wAnim('idesc', desc, 0), rows.length * 55 + 180);
}

function wAnim(id, text, delay) {
  const el = document.getElementById(id);
  el.innerHTML = ''; el.classList.add('wanim');
  text.split(' ').forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'w';
    s.textContent = w + ' ';
    s.style.animationDelay = `${delay + i * 52}ms`;
    el.appendChild(s);
  });
}

let dark = false;
document.getElementById('darkToggle').addEventListener('click', () => {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  document.getElementById('ti').textContent = dark ? '☀️' : '🌙';
  document.getElementById('tl').textContent = dark ? 'LIGHT MODE' : 'DARK MODE';
});
